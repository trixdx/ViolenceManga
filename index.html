<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Violence — Manga Reader</title>
  <meta name="theme-color" content="#7c3aed" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon-192.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon-192.svg" />
  <link rel="stylesheet" href="./css/main.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/palettes.css" />
  <link rel="stylesheet" href="./css/effects.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/reader.css" />
</head>
<body class="layout-dock">
  <div class="app-bg">
    <div class="mesh-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand" data-home-brand role="button" tabindex="0" aria-label="Violence — на главную">
      <div class="brand-mark">
        <div class="brand-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="3" width="11" height="26" rx="2" fill="rgba(255,255,255,0.18)"/>
            <rect x="17" y="3" width="11" height="26" rx="2" fill="rgba(255,255,255,0.28)"/>
            <path d="M10 24L16 8L22 24" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
      <div class="brand-text">
        <h1 class="brand-title">Violence</h1>
        <p class="brand-tagline"><span class="brand-dot"></span>Manga Reader</p>
      </div>
    </div>

    <nav class="sidebar-nav">
      <p class="nav-group-label" data-i18n="nav.menu">Меню</p>
      <button class="nav-item active" data-route="home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z"/></svg>
        <span data-i18n="nav.home">Главная</span>
      </button>
      <button class="nav-item" data-route="browse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/><path d="M8 11h6M11 8v6"/></svg>
        <span data-i18n="nav.browse">Каталог</span>
      </button>
      <button class="nav-item" data-route="library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        <span data-i18n="nav.library">Библиотека</span>
      </button>
      <button class="nav-item" data-route="stats">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M10 19V9M16 19v-6M22 19V3"/></svg>
        <span data-i18n="nav.stats">Статистика</span>
      </button>

      <p class="nav-group-label" data-i18n="nav.account">Аккаунт</p>
      <button class="nav-item" data-route="profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span data-i18n="nav.profile">Профиль</span>
      </button>
      <button class="nav-item" data-route="achievements">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="6"/><path d="M8.5 14L7 22l5-3 5 3-1.5-8"/></svg>
        <span data-i18n="nav.achievements">Достижения</span>
      </button>
      <button class="nav-item" data-route="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <span data-i18n="nav.settings">Настройки</span>
      </button>
    </nav>

    <div class="sidebar-user sidebar-user-trigger" id="sidebar-user-mobile">
      <div class="avatar" data-user-avatar>G</div>
      <div class="user-info">
        <strong data-user-name>Гость</strong>
        <span data-user-hint>Не авторизован</span>
      </div>
      <svg class="user-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </div>
  </aside>

  <div class="user-menu" id="user-menu"></div>

  <main class="main">
    <header class="dock-header">
      <button class="dock-brand" data-home-brand type="button" aria-label="Violence — на главную">
        <span class="brand-title">Violence</span>
      </button>

      <nav class="dock-nav">
        <button class="nav-item active" data-route="home">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z"/></svg>
          <span data-i18n="nav.home">Главная</span>
        </button>
        <button class="nav-item" data-route="browse">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
          <span data-i18n="nav.browse">Каталог</span>
        </button>
        <button class="nav-item" data-route="library">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          <span data-i18n="nav.library">Библиотека</span>
        </button>
        <button class="nav-item" data-route="profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          <span data-i18n="nav.profile">Профиль</span>
        </button>
        <button class="nav-item" data-route="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/></svg>
          <span data-i18n="nav.settings">Настройки</span>
        </button>
      </nav>

      <div class="dock-end">
      <div class="search-bar dock-search" id="search-bar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        <input type="search" id="search-input" placeholder="Поиск манги..." autocomplete="off" />
        <kbd>Ctrl K</kbd>
      </div>

      <div class="dock-actions">
        <button class="menu-toggle icon-btn" id="menu-toggle" aria-label="Меню">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <button class="icon-btn" id="theme-toggle" title="Тема" aria-label="Тема">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        </button>
        <button class="icon-btn notification-btn" id="notif-btn" title="Уведомления">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="badge" id="notif-badge" hidden>0</span>
        </button>
        <div class="dock-profile sidebar-user-trigger" id="sidebar-user">
          <div class="avatar" data-user-avatar>G</div>
          <div class="user-info">
            <strong data-user-name>Гость</strong>
            <span data-user-hint>Не авторизован</span>
          </div>
        </div>
      </div>
      </div>
    </header>

    <div class="page-shell">
      <div class="content" id="content"></div>
    </div>
  </main>

  <nav class="bottom-nav" id="bottom-nav">
    <button class="bottom-nav-item active" data-route="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1h-5v-6H9v6H4a1 1 0 01-1-1V9.5z"/></svg>
      <span data-i18n="nav.home">Главная</span>
    </button>
    <button class="bottom-nav-item" data-route="browse">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <span data-i18n="nav.browse">Каталог</span>
    </button>
    <button class="bottom-nav-item" data-route="library">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      <span data-i18n="nav.library">Библиотека</span>
    </button>
    <button class="bottom-nav-item" data-route="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span data-i18n="nav.profile">Профиль</span>
    </button>
    <button class="bottom-nav-item" data-route="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2"/></svg>
      <span data-i18n="nav.more">Ещё</span>
    </button>
  </nav>

  <div class="reader-overlay" id="reader-overlay" hidden>
    <header class="reader-header">
      <button class="icon-btn" id="reader-back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div class="reader-title" id="reader-title">Глава</div>
      <div class="reader-controls">
        <button class="icon-btn" id="reader-zoom-out" title="Уменьшить (−)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg>
        </button>
        <span class="reader-zoom-label" id="reader-zoom-label">100%</span>
        <button class="icon-btn" id="reader-zoom-in" title="Увеличить (+)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <button class="icon-btn" id="reader-spread" title="Разворот (две страницы)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="18" rx="1"/><rect x="13" y="3" width="8" height="18" rx="1"/></svg>
        </button>
        <button class="icon-btn" id="reader-thumbs" title="Миниатюры (T)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </button>
        <button class="icon-btn" id="reader-fit" title="По ширине">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
        </button>
        <button class="icon-btn" id="reader-mode" title="Горизонтальный режим">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18"/></svg>
        </button>
        <button class="icon-btn" id="reader-autoscroll" title="Автопрокрутка (S)" data-i18n="reader.autoscroll" data-i18n-attr="title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M8 9l4-4 4 4M8 15l4 4 4-4"/></svg>
        </button>
        <button class="icon-btn" id="reader-fullscreen" title="Полный экран (F)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3M21 8V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3M16 21h3a2 2 0 002-2v-3"/></svg>
        </button>
      </div>
    </header>
    <div class="reader-progress">
      <div class="reader-progress-bar" id="reader-progress-bar"></div>
    </div>
    <div class="reader-body">
      <div class="reader-viewport" id="reader-viewport"></div>
    </div>
    <div class="reader-thumbnails" id="reader-thumbnails" hidden></div>
    <footer class="reader-footer">
      <button class="btn btn-ghost btn-sm" id="reader-prev-chapter" data-i18n="reader.prevChapter">← Глава</button>
      <button class="btn btn-ghost" id="reader-prev" data-i18n="reader.prevPage">← Стр.</button>
      <span id="reader-page-info">1 / 1</span>
      <button class="btn btn-ghost" id="reader-next" data-i18n="reader.nextPage">Стр. →</button>
      <button class="btn btn-ghost btn-sm" id="reader-next-chapter" data-i18n="reader.nextChapter">Глава →</button>
    </footer>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <div class="modal-overlay" id="modal-overlay" hidden></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
